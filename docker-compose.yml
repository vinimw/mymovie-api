services:
  postgres:
    image: postgres:16-alpine
    container_name: my-movies-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-my_movies}
      POSTGRES_USER: ${POSTGRES_USER:-my_movies}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-my_movies}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-my_movies} -d $${POSTGRES_DB:-my_movies}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
